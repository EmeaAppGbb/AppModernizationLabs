name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          # Copy site files, excluding dev/CI directories
          shopt -s dotglob nullglob
          for item in *; do
            case "$item" in
              _site|.git|.squad|.github|.copilot|node_modules|.gitignore|.gitattributes) continue ;;
              *) cp -r "$item" _site/ ;;
            esac
          done
          echo "📦 Site contents:"
          ls -la _site/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
