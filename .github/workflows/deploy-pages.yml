name: Publish to Pages Branch

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'styles.css'
      - 'script.js'
      - 'appmodlab.json'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Sync site files to pages branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Checkout pages branch
        uses: actions/checkout@v4
        with:
          ref: pages
          path: pages-dest

      - name: Sync site files
        run: |
          # Clean old site files in pages (preserve .git)
          cd pages-dest
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +

          # Copy site files from main
          cp ../main-src/index.html .
          cp ../main-src/styles.css .
          cp ../main-src/script.js .
          cp ../main-src/appmodlab.json .
          cp -r ../main-src/assets .

          echo "📦 Pages branch contents:"
          ls -la
        working-directory: ${{ github.workspace }}

      - name: Commit and push
        run: |
          cd pages-dest
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "ℹ️  No changes to publish"
          else
            SHORT_SHA=$(cd ../main-src && git rev-parse --short HEAD)
            git commit -m "chore: sync site files from main (${SHORT_SHA})"
            git push origin pages
            echo "✅ Published to pages branch"
          fi
        working-directory: ${{ github.workspace }}
