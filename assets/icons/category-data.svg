<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <!-- Database cylinder - top ellipse -->
  <rect x="6" y="3" width="12" height="2" fill="#00d4aa"/>
  <rect x="4" y="5" width="2" height="2" fill="#00d4aa"/>
  <rect x="18" y="5" width="2" height="2" fill="#00d4aa"/>
  <rect x="6" y="7" width="12" height="2" fill="#00d4aa" opacity="0.7"/>
  <!-- Database body -->
  <rect x="4" y="7" width="2" height="10" fill="#00d4aa"/>
  <rect x="18" y="7" width="2" height="10" fill="#00d4aa"/>
  <!-- Middle ring -->
  <rect x="6" y="11" width="12" height="2" fill="#00d4aa" opacity="0.5"/>
  <rect x="8" y="11" width="4" height="2" fill="#ffd93d" opacity="0.6"/>
  <!-- Bottom ellipse -->
  <rect x="6" y="17" width="12" height="2" fill="#00d4aa"/>
  <rect x="4" y="17" width="2" height="2" fill="#00d4aa"/>
  <rect x="18" y="17" width="2" height="2" fill="#00d4aa"/>
  <rect x="6" y="19" width="12" height="2" fill="#00d4aa" opacity="0.5"/>
  <!-- Data flow dots -->
  <rect x="8" y="14" width="2" height="2" fill="#ff6b9d" opacity="0.5"/>
  <rect x="14" y="14" width="2" height="2" fill="#ff6b9d" opacity="0.5"/>
</svg>
