<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Pixel crescent moon -->
  <rect x="8" y="1" width="4" height="2" fill="#e8e8e8"/>
  <rect x="6" y="3" width="2" height="2" fill="#e8e8e8"/>
  <rect x="5" y="5" width="2" height="2" fill="#e8e8e8"/>
  <rect x="4" y="7" width="2" height="4" fill="#e8e8e8"/>
  <rect x="5" y="11" width="2" height="2" fill="#e8e8e8"/>
  <rect x="6" y="13" width="4" height="2" fill="#e8e8e8"/>
  <rect x="10" y="11" width="2" height="2" fill="#e8e8e8"/>
  <!-- Inner shadow (crescent cutout) -->
  <rect x="10" y="3" width="2" height="2" fill="#e8e8e8"/>
  <rect x="12" y="3" width="2" height="2" fill="#e8e8e8"/>
  <rect x="12" y="5" width="2" height="2" fill="#e8e8e8"/>
  <rect x="11" y="7" width="2" height="2" fill="#e8e8e8"/>
  <rect x="11" y="9" width="2" height="2" fill="#e8e8e8"/>
  <!-- Small pixel star nearby -->
  <rect x="12" y="1" width="2" height="2" fill="#e8e8e8" opacity="0.5"/>
  <rect x="2" y="4" width="2" height="2" fill="#e8e8e8" opacity="0.3"/>
</svg>
