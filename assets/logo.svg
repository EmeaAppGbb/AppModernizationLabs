<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" shape-rendering="crispEdges">
  <!-- Pixel Gamepad Body -->
  <rect x="8" y="16" width="4" height="4" fill="#00d4aa"/>
  <rect x="12" y="12" width="4" height="4" fill="#00d4aa"/>
  <rect x="16" y="8" width="4" height="4" fill="#00d4aa"/>
  <rect x="20" y="8" width="4" height="4" fill="#00d4aa"/>
  <rect x="24" y="8" width="4" height="4" fill="#00d4aa"/>
  <rect x="28" y="8" width="4" height="4" fill="#00d4aa"/>
  <rect x="32" y="8" width="4" height="4" fill="#00d4aa"/>
  <rect x="36" y="8" width="4" height="4" fill="#00d4aa"/>
  <rect x="40" y="8" width="4" height="4" fill="#00d4aa"/>
  <rect x="44" y="12" width="4" height="4" fill="#00d4aa"/>
  <rect x="48" y="16" width="4" height="4" fill="#00d4aa"/>
  <!-- Gamepad fill rows -->
  <rect x="8" y="20" width="4" height="4" fill="#00d4aa"/>
  <rect x="12" y="16" width="4" height="4" fill="#00d4aa"/>
  <rect x="16" y="12" width="40" height="4" fill="#00d4aa"/>
  <rect x="8" y="24" width="44" height="4" fill="#00d4aa"/>
  <rect x="12" y="28" width="36" height="4" fill="#00d4aa"/>
  <rect x="16" y="32" width="28" height="4" fill="#00d4aa"/>
  <rect x="20" y="36" width="20" height="4" fill="#00d4aa"/>
  <rect x="48" y="20" width="4" height="4" fill="#00d4aa"/>
  <rect x="48" y="24" width="4" height="4" fill="#00d4aa"/>
  <!-- D-Pad -->
  <rect x="16" y="20" width="4" height="4" fill="#0f0f23"/>
  <rect x="20" y="16" width="4" height="4" fill="#0f0f23"/>
  <rect x="20" y="20" width="4" height="4" fill="#0f0f23"/>
  <rect x="20" y="24" width="4" height="4" fill="#0f0f23"/>
  <rect x="24" y="20" width="4" height="4" fill="#0f0f23"/>
  <!-- Buttons -->
  <rect x="36" y="16" width="4" height="4" fill="#ff6b9d"/>
  <rect x="44" y="16" width="4" height="4" fill="#ffd93d"/>
  <rect x="40" y="20" width="4" height="4" fill="#ff6b9d"/>
  <!-- Code bracket </> between gamepad and text -->
  <rect x="58" y="16" width="4" height="4" fill="#ffd93d"/>
  <rect x="54" y="20" width="4" height="4" fill="#ffd93d"/>
  <rect x="54" y="24" width="4" height="4" fill="#ffd93d"/>
  <rect x="58" y="28" width="4" height="4" fill="#ffd93d"/>
  <rect x="62" y="20" width="4" height="4" fill="#ffd93d"/>
  <rect x="66" y="24" width="4" height="4" fill="#ffd93d"/>
  <rect x="70" y="16" width="4" height="4" fill="#ffd93d"/>
  <rect x="70" y="28" width="4" height="4" fill="#ffd93d"/>
  <rect x="74" y="20" width="4" height="4" fill="#ffd93d"/>
  <rect x="74" y="24" width="4" height="4" fill="#ffd93d"/>
  <!-- Pixel text: APP MOD LABS -->
  <!-- A -->
  <rect x="84" y="16" width="2" height="2" fill="#e8e8e8"/>
  <rect x="86" y="14" width="2" height="2" fill="#e8e8e8"/>
  <rect x="88" y="14" width="2" height="2" fill="#e8e8e8"/>
  <rect x="90" y="16" width="2" height="2" fill="#e8e8e8"/>
  <rect x="84" y="18" width="2" height="2" fill="#e8e8e8"/>
  <rect x="90" y="18" width="2" height="2" fill="#e8e8e8"/>
  <rect x="84" y="20" width="8" height="2" fill="#e8e8e8"/>
  <rect x="84" y="22" width="2" height="2" fill="#e8e8e8"/>
  <rect x="90" y="22" width="2" height="2" fill="#e8e8e8"/>
  <rect x="84" y="24" width="2" height="2" fill="#e8e8e8"/>
  <rect x="90" y="24" width="2" height="2" fill="#e8e8e8"/>
  <!-- P -->
  <rect x="94" y="14" width="2" height="12" fill="#e8e8e8"/>
  <rect x="96" y="14" width="4" height="2" fill="#e8e8e8"/>
  <rect x="100" y="16" width="2" height="4" fill="#e8e8e8"/>
  <rect x="96" y="20" width="4" height="2" fill="#e8e8e8"/>
  <!-- P -->
  <rect x="104" y="14" width="2" height="12" fill="#e8e8e8"/>
  <rect x="106" y="14" width="4" height="2" fill="#e8e8e8"/>
  <rect x="110" y="16" width="2" height="4" fill="#e8e8e8"/>
  <rect x="106" y="20" width="4" height="2" fill="#e8e8e8"/>
  <!-- Space then M -->
  <rect x="118" y="14" width="2" height="12" fill="#00d4aa"/>
  <rect x="120" y="16" width="2" height="2" fill="#00d4aa"/>
  <rect x="122" y="18" width="2" height="2" fill="#00d4aa"/>
  <rect x="124" y="16" width="2" height="2" fill="#00d4aa"/>
  <rect x="126" y="14" width="2" height="12" fill="#00d4aa"/>
  <!-- O -->
  <rect x="130" y="16" width="2" height="8" fill="#00d4aa"/>
  <rect x="132" y="14" width="4" height="2" fill="#00d4aa"/>
  <rect x="136" y="16" width="2" height="8" fill="#00d4aa"/>
  <rect x="132" y="24" width="4" height="2" fill="#00d4aa"/>
  <!-- D -->
  <rect x="140" y="14" width="2" height="12" fill="#00d4aa"/>
  <rect x="142" y="14" width="4" height="2" fill="#00d4aa"/>
  <rect x="146" y="16" width="2" height="8" fill="#00d4aa"/>
  <rect x="142" y="24" width="4" height="2" fill="#00d4aa"/>
  <!-- Space then L -->
  <rect x="154" y="14" width="2" height="12" fill="#ff6b9d"/>
  <rect x="156" y="24" width="6" height="2" fill="#ff6b9d"/>
  <!-- A -->
  <rect x="164" y="16" width="2" height="2" fill="#ff6b9d"/>
  <rect x="166" y="14" width="2" height="2" fill="#ff6b9d"/>
  <rect x="168" y="14" width="2" height="2" fill="#ff6b9d"/>
  <rect x="170" y="16" width="2" height="2" fill="#ff6b9d"/>
  <rect x="164" y="18" width="8" height="2" fill="#ff6b9d"/>
  <rect x="164" y="20" width="2" height="6" fill="#ff6b9d"/>
  <rect x="170" y="20" width="2" height="6" fill="#ff6b9d"/>
  <!-- B -->
  <rect x="174" y="14" width="2" height="12" fill="#ff6b9d"/>
  <rect x="176" y="14" width="4" height="2" fill="#ff6b9d"/>
  <rect x="180" y="16" width="2" height="2" fill="#ff6b9d"/>
  <rect x="176" y="18" width="4" height="2" fill="#ff6b9d"/>
  <rect x="180" y="20" width="2" height="4" fill="#ff6b9d"/>
  <rect x="176" y="24" width="4" height="2" fill="#ff6b9d"/>
  <!-- S -->
  <rect x="184" y="14" width="8" height="2" fill="#ff6b9d"/>
  <rect x="184" y="16" width="2" height="4" fill="#ff6b9d"/>
  <rect x="186" y="18" width="4" height="2" fill="#ff6b9d"/>
  <rect x="190" y="20" width="2" height="4" fill="#ff6b9d"/>
  <rect x="184" y="24" width="8" height="2" fill="#ff6b9d"/>
  <!-- Decorative pixel sparkles -->
  <rect x="4" y="8" width="2" height="2" fill="#ffd93d" opacity="0.6"/>
  <rect x="52" y="36" width="2" height="2" fill="#ffd93d" opacity="0.6"/>
  <rect x="80" y="10" width="2" height="2" fill="#ffd93d" opacity="0.4"/>
  <!-- Tagline area: small pixel dots -->
  <rect x="84" y="32" width="108" height="2" fill="#4a4a8a" opacity="0.3"/>
  <!-- Pixel text "LEVEL UP YOUR APPS" tiny -->
  <rect x="86" y="36" width="2" height="2" fill="#4a4a8a" opacity="0.5"/>
  <rect x="90" y="36" width="2" height="2" fill="#4a4a8a" opacity="0.5"/>
  <rect x="94" y="36" width="2" height="2" fill="#4a4a8a" opacity="0.5"/>
  <rect x="98" y="36" width="2" height="2" fill="#4a4a8a" opacity="0.5"/>
  <rect x="102" y="36" width="2" height="2" fill="#4a4a8a" opacity="0.5"/>
  <rect x="108" y="36" width="2" height="2" fill="#4a4a8a" opacity="0.5"/>
  <rect x="112" y="36" width="2" height="2" fill="#4a4a8a" opacity="0.5"/>
  <!-- Bottom pixel border -->
  <rect x="0" y="52" width="200" height="2" fill="#4a4a8a" opacity="0.2"/>
  <rect x="0" y="56" width="4" height="2" fill="#00d4aa" opacity="0.3"/>
  <rect x="8" y="56" width="4" height="2" fill="#ff6b9d" opacity="0.3"/>
  <rect x="16" y="56" width="4" height="2" fill="#ffd93d" opacity="0.3"/>
</svg>
